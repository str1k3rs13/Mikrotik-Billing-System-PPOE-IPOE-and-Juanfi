<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Help &amp; Support — JEFF NETWORK SERVICE</title>
<style>
  :root{
    --bg:#1a0e2e;--panel:#2a1850;--panel2:#33205e;--inbg:#21123d;--line:#3d2a66;
    --ink:#f4eefe;--muted:#b9a9d6;--pink:#e8195f;--violet:#7c3aed;--cyan:#22d3ee;--ok:#34d399;--bad:#fb7185;
    --grad:linear-gradient(120deg,#e8195f,#a21caf 55%,#7c3aed)
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{text-decoration:none;color:inherit}
  .bgfx{position:fixed;inset:0;z-index:0;pointer-events:none;background:
     radial-gradient(1000px 600px at 50% -10%, rgba(124,58,237,.4), transparent 60%),
     radial-gradient(800px 500px at 50% 110%, rgba(232,25,95,.25), transparent 60%), var(--bg)}
  .nav{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 22px;background:rgba(26,14,46,.7);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:17px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--grad);display:grid;place-items:center;font-size:18px;box-shadow:0 0 22px rgba(232,25,95,.5)}
  .navlinks{display:flex;gap:8px;flex-wrap:wrap}
  .navlinks a{color:var(--muted);font-weight:600;font-size:14px;padding:9px 15px;border-radius:24px;transition:.15s}
  .navlinks a:hover{color:#fff;background:rgba(255,255,255,.06)}
  .navlinks a.active{color:#fff;background:var(--grad);font-weight:700}
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:40px 22px}
  .hero{background:var(--grad);border-radius:20px;padding:26px 24px;margin-bottom:22px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.12)}
  .hero .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.9;font-weight:700}
  .hero h1{font-size:26px;font-weight:850;letter-spacing:-.5px;margin:4px 0}
  .hero p{font-size:14px;opacity:.92}
  .card{background:linear-gradient(170deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:20px;padding:26px}
  label{display:block;font-size:12px;font-weight:700;margin:16px 0 6px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  input,textarea,select{width:100%;background:var(--inbg);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:14px;font-size:15px;font-family:inherit}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pink)}
  textarea{min-height:120px;resize:vertical}
  button{width:100%;background:var(--grad);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;margin-top:18px;box-shadow:0 8px 22px rgba(232,25,95,.4)}
  button:disabled{opacity:.6}
  .msg{margin-top:14px;padding:13px;border-radius:11px;font-size:14px;display:none}
  .msg.ok{display:block;background:rgba(52,211,153,.12);border:1px solid var(--ok);color:#a7f3d0}
  .msg.err{display:block;background:rgba(251,113,133,.12);border:1px solid var(--bad);color:#fecdd3}
  footer{position:relative;z-index:1;text-align:center;color:var(--muted);font-size:13px;padding:30px 22px 40px}
</style>
</head>
<body>
  <div class="bgfx"></div>
  <input id="_hp" name="website" type="text" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" aria-hidden="true">
  <script>window.__formStart=Date.now();</script>

  <nav class="nav">
    <a href="/" class="brand"><span class="logo">📡</span> JEFF NETWORK</a>
    <div class="navlinks">
      <a href="/apply">Apply</a>
      <a href="/account">My Account</a>
      <a href="/help" class="active">Help</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">Support</div>
      <h1>Report a problem</h1>
      <p>Tell us what's happening and we'll get on it.</p>
    </div>
    <div class="card">
      <label>Your name *</label>
      <input id="name" placeholder="Your name or account username">
      <label>Contact number *</label>
      <input id="contact" placeholder="09xx xxx xxxx">
      <label>What's the issue?</label>
      <select id="topic">
        <option value="">Choose a topic</option>
        <option>No internet / disconnected</option>
        <option>Slow connection</option>
        <option>Intermittent / drops</option>
        <option>Billing question</option>
        <option>Other</option>
      </select>
      <label>Describe the problem</label>
      <textarea id="message" placeholder="Tell us what is happening..."></textarea>
      <button id="submit" onclick="submitHelp()">Send report</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <footer>📡 JEFF NETWORK SERVICE · Ibajay, Aklan</footer>

<script>
  function $(id){return document.getElementById(id)}
  async function submitHelp(){
    const msg=$("msg"); msg.className="msg";
    const body={name:$("name").value.trim(),contact:$("contact").value.trim(),topic:$("topic").value,message:$("message").value.trim()}; body._hp=(document.getElementById('_hp')||{}).value||''; body._t=Date.now()-(window.__formStart||0);
    if(!body.name||!body.contact){msg.className="msg err";msg.textContent="Please enter your name and contact.";return}
    $("submit").disabled=true;$("submit").textContent="Sending...";
    try{
      const r=await fetch("/api/help",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const d=await r.json();
      if(d.ok){msg.className="msg ok";msg.textContent=d.message;["name","contact","message"].forEach(i=>$(i).value="");$("topic").value="";}
      else{msg.className="msg err";msg.textContent=d.error||"Something went wrong.";}
    }catch(e){msg.className="msg err";msg.textContent="Network error. Please try again.";}
    $("submit").disabled=false;$("submit").textContent="Send report";
  }
</script>
</body>
</html>
